site_name: Mayflower Sandbox
site_description: Production-ready Python sandbox implementing the DeepAgents SandboxBackendProtocol
repo_url: https://github.com/mayflower/mayflower_sandbox
repo_name: mayflower/mayflower_sandbox

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - techdocs-core

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - How-To Guides:
      - Document Processing: how-to/document-processing.md
      - Skills & MCP: how-to/skills-and-mcp.md
      - Deployment: how-to/deployment.md
      - Troubleshooting: how-to/troubleshooting.md
  - Reference:
      - Backend API: reference/backend-api.md
      - Configuration: reference/configuration.md
      - Document Helpers: reference/document-helpers.md
      - Internal API: reference/api.md
  - Architecture:
      - System Design: architecture/system-design.md
      - Command Routing: architecture/command-routing.md
      - Security Model: architecture/security-model.md
      - Performance: architecture/performance.md
